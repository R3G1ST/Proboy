<%+header%>

<h2><%:Proboy Dashboard%></h2>

<div class="cbi-section">
    <h3><%:Service Status%></h3>
    <div class="cbi-section-node">
        <table class="cbi-section-table" style="width:100%">
            <tr><td style="width:200px"><b>Zapret (DPI Bypass)</b></td><td id="st-zapret">...</td></tr>
            <tr><td><b>sing-box (Proxy)</b></td><td id="st-singbox">...</td></tr>
            <tr><td><b>Game Filter</b></td><td id="st-game">...</td></tr>
            <tr><td><b>DNS Bypass</b></td><td id="st-dns">...</td></tr>
            <tr><td><b>Strategy</b></td><td id="st-strategy">...</td></tr>
            <tr><td><b>Version</b></td><td id="st-version">...</td></tr>
        </table>
    </div>
</div>

<div class="cbi-section">
    <h3><%:Control%></h3>
    <div class="cbi-section-node">
        <input type="button" class="cbi-button cbi-button-apply" value="<%:Start%>" onclick="proboyAct('start')" />
        <input type="button" class="cbi-button cbi-button-reset" value="<%:Stop%>" onclick="proboyAct('stop')" />
        <input type="button" class="cbi-button cbi-button-apply" value="<%:Restart%>" onclick="proboyAct('restart')" />
        <div id="act-result" style="margin-top:8px;display:none;padding:8px;border-radius:4px;"></div>
    </div>
</div>

<div class="cbi-section">
    <h3><%:Links%></h3>
    <div class="cbi-section-node">
        <p><a href="http://<%=luci.http.getenv("SERVER_NAME") or "192.168.1.1"%>:8080/" target="_blank"><%:Open Web Panel%></a></p>
    </div>
</div>

<script>
function proboyAct(m) {
    var el = document.getElementById("act-result");
    el.style.display = "block";
    el.style.background = "#e8f5e9";
    el.innerHTML = "Executing " + m + "...";
    XHR.get('<%=luci.dispatcher.build_url("admin", "services", "proboy", "action")%>', {method: m}, function(x, data) {
        el.style.background = "#e8f5e9";
        el.innerHTML = "Done! Reloading...";
        setTimeout(function(){ location.reload(); }, 2000);
    });
}

XHR.get('<%=luci.dispatcher.build_url("admin", "services", "proboy", "action")%>', {method: "status"}, function(x, data) {
    if (!data) return;
    document.getElementById("st-zapret").innerHTML = data.zapret ? '<span style="color:green">Running</span>' : '<span style="color:red">Stopped</span>';
    document.getElementById("st-singbox").innerHTML = data.singbox ? '<span style="color:green">Running</span>' : '<span style="color:red">Stopped</span>';
    document.getElementById("st-game").innerHTML = data.gamefilter ? '<span style="color:green">Enabled</span>' : '<span style="color:gray">Disabled</span>';
    document.getElementById("st-dns").innerHTML = data.dns ? '<span style="color:green">Enabled</span>' : '<span style="color:gray">Disabled</span>';
    document.getElementById("st-strategy").innerHTML = data.strategy || "auto";
    document.getElementById("st-version").innerHTML = data.version || "unknown";
});
</script>

<%+footer%>
